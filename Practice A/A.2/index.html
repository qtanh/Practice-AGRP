<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K25_CNTT_HN Toast System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-content">
        <h1>K25_CNTT_HN</h1>
        <h2>Toast Notification System</h2>

        <div class="control-panel">
            <p>• LIVE DEMO - TRIGGER TOASTS</p>
            <div class="button-group">
                <button class="btn btn-success" onclick="showToast('success', 'Thành công', 'Bài viết đã được lưu.')">
                    <i class="fa-regular fa-circle-check"></i> Success
                </button>
                <button class="btn btn-error" onclick="showToast('error', 'Có lỗi xảy ra', 'Không thể kết nối máy chủ. Vui lòng thử lại.')">
                    <i class="fa-regular fa-circle-xmark"></i> Error
                </button>
                <button class="btn btn-info" onclick="showToast('info', 'Thông tin', 'Hệ thống sẽ bảo trì lúc 23:00 tối nay.')">
                    <i class="fa-solid fa-circle-info"></i> Info
                </button>
                <button class="btn btn-warning" onclick="showToast('warning', 'Cảnh báo', 'Phiên đăng nhập sắp hết hạn sau 5 phút.')">
                    <i class="fa-solid fa-triangle-exclamation"></i> Warning
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
